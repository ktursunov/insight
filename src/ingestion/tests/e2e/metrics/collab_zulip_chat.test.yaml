spec_version: 1
description: >
  Metric: zulip_messages_sent — IC Bullet Collaboration (…0012), #1413.
  How it's computed (bronze → silver → gold):
    • bronze: Zulip users (emails) + per-sender message counts from the Zulip proxy
    • silver: deduped by `uniq` to per-person/day chat-message totals
    • gold:   value = the requested member's per-person SUM of Zulip messages sent
              over the window (chat-only). median/p25/p75/range = the distribution
              of those per-person SUMs across the member's DEPARTMENT (org_unit_id).

  Department: 5 Engineering members (alice, bob, carol, dave, erin) with message
  counts {10,20,30,40,50}. Each member has one Zulip user (sender_id = id) and one
  message-row dated 2026-12-25. The IC case requests erin (50), so value = 50; the
  department of 5 yields median 30, p25 20, p75 40, range [10,50].
  Cases: custom scope (single window over the department) · empty window.

bronze:
  bronze_bamboohr.employees:
    - $ref: templates/people.yaml#/templates/alice
    - $ref: templates/people.yaml#/templates/bob
    - $ref: templates/people.yaml#/templates/carol
    - $ref: templates/people.yaml#/templates/dave
    - $ref: templates/people.yaml#/templates/erin

  # Zulip user directory — messages join on sender_id = id; users join people on
  # lower(email) = person_id. alice/bob/carol come from the shared template;
  # dave/erin are defined inline off the base zulip_user template.
  bronze_zulip_proxy.users:
    - $ref: templates/zulip.yaml#/templates/alice_user
    - $ref: templates/zulip.yaml#/templates/bob_user
    - $ref: templates/zulip.yaml#/templates/carol_user
    - { $ref: templates/zulip.yaml#/templates/zulip_user, id: 4, email: dave@example.com, full_name: Dave Delta,   unique_key: zulip-user-4 }
    - { $ref: templates/zulip.yaml#/templates/zulip_user, id: 5, email: erin@example.com, full_name: Erin Epsilon, unique_key: zulip-user-5 }

  bronze_zulip_proxy.messages:
    - { $ref: templates/zulip.yaml#/templates/zulip_message, sender_id: 1, created_at: "2026-12-25T10:00:00", uniq: z-alice-20261225, unique_key: zmsg-alice-20261225, count: 10 }
    - { $ref: templates/zulip.yaml#/templates/zulip_message, sender_id: 1, created_at: "2026-12-25T10:00:00", uniq: z-alice-20261225, unique_key: zmsg-alice-20261225, count: 10 }   # duplicate uniq → dedup, not 20
    - { $ref: templates/zulip.yaml#/templates/zulip_message, sender_id: 2, created_at: "2026-12-25T10:00:00", uniq: z-bob-20261225,   unique_key: zmsg-bob-20261225,   count: 20 }
    - { $ref: templates/zulip.yaml#/templates/zulip_message, sender_id: 3, created_at: "2026-12-25T10:00:00", uniq: z-carol-20261225, unique_key: zmsg-carol-20261225, count: 30 }
    - { $ref: templates/zulip.yaml#/templates/zulip_message, sender_id: 4, created_at: "2026-12-25T10:00:00", uniq: z-dave-20261225,  unique_key: zmsg-dave-20261225,  count: 40 }
    - { $ref: templates/zulip.yaml#/templates/zulip_message, sender_id: 5, created_at: "2026-12-25T10:00:00", uniq: z-erin-20261225,  unique_key: zmsg-erin-20261225,  count: 50 }

cases:
  # dept {10,20,30,40,50}; erin value 50. p25=20 median=30 p75=40 range=[10,50]
  - name: "zulip_messages_sent — custom scope (department of 5)"
    request:
      url: /v1/metrics/queries
      method: POST
      body:
        queries:
          - id: collaboration
            metric_id: 00000000-0000-0000-0001-000000000012
            $filter: "person_id eq 'erin@example.com' and metric_date ge '2026-12-01' and metric_date le '2026-12-31'"
    expect:
      - assert: "status == 200"
      - in: collaboration
        assert: "result.status == 'ok'"
      - in: collaboration
        find: { metric_key: zulip_messages_sent }
        equal: { value: 50, median: 30, range_min: 10, range_max: 50, p25: 20, p75: 40 }

  # ── EMPTY window (no rows in range) ──────────────────────────────────────────
  - name: "zulip_messages_sent — EMPTY window (no data → no items)"
    request:
      url: /v1/metrics/queries
      method: POST
      body:
        queries:
          - id: collaboration
            metric_id: 00000000-0000-0000-0001-000000000012
            $filter: "person_id eq 'erin@example.com' and metric_date ge '2026-06-01' and metric_date le '2026-06-30'"
    expect:
      - assert: "status == 200"
      - in: collaboration
        assert: "result.status == 'ok'"
      - in: collaboration
        assert: "size(items) == 0"
