spec_version: 1
description: >
  Metric: tasks_completed - Team Bullet Task Delivery (...0003), the TEAM variant
  of the IC bullet (...0011); department-of-5 distribution + 6 stats in a single
  custom window.

  bronze -> silver -> gold: jira_issue (Closed) + jira_issue_history
  (Status->Closed event = metric_date) + jira_user. Per person, v_period = COUNT
  of tasks closed in the window; the TEAM bullet value = the department AVERAGE of
  those per-person counts (the IC bullet ...0011 returns the requested member's own
  count instead). median/p25/p75/range = the department (org_unit_id) distribution.

  Department: 5 Engineering members alice..erin of rank r in 1..5, each closing r
  Tasks on 2026-12-25. Custom window 2026-12-20..12-31 -> per-person counts
  {1,2,3,4,5} -> value = avg = 3 (== median; symmetric AP dept). Filtered by the
  department (org_unit_id) string. Empty window 2026-06 -> no items.

