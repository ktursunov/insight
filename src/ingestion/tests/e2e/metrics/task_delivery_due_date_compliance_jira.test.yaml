spec_version: 1
description: >
  Task Delivery - due_date_compliance - JIRA, IC Bullet Task Delivery (...0011),
  department-of-5 distribution + 6 stats in a single custom window.

  bronze -> silver -> gold: jira_issue + jira_issue_history (Status->Closed event
  = metric_date) + jira_user. jira_closed_tasks per (person, close-day):
    has_due_date_count = countIf(due present);
    on_time_count      = countIf(due present AND close<=due).
  The ...0011 query_ref: if(Σwith_due>0, round(100*Σon_time/Σwith_due, 1)).

  Department: 5 Engineering members alice..erin of rank r in 1..5. Each closes
  EXACTLY 4 issues on the same close date (2026-12-25), ALL carrying a due date:
  (r-1) on time (due = close+5d) + (5-r) late (due = close-5d) -> per-person
  compliance = 100*(r-1)/4 = {0,25,50,75,100}. alice(r=1)=0% (0 on-time / 4 with
  due, denominator>0 so NOT dropped); erin(r=5)=100%. value = the requested
  member's OWN compliance; median/p25/p75/range = the department distribution.

  REGRESSION GUARD: the due date is set ONLY on the bronze `due_date` column (no
  `duedate` changelog item), so it must reach due_date_compliance via the
  Jira-native field_id `duedate` -- fails if jira__issue_field_snapshot regresses.
  Empty window 2026-06 -> no items.

