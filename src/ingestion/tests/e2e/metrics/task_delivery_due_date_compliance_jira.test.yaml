cases:
  - name: "due_date_compliance — custom scope (department of 5)"
    request:
      url: /v1/metrics/queries
      method: POST
      body:
        queries:
          - id: task_delivery
            metric_id: 00000000-0000-0000-0001-000000000011
            $top: 50
            $filter: "person_id eq 'erin@example.com' and metric_date ge '2026-12-20' and metric_date le '2026-12-31'"
            $orderby: metric_key
    expect:
      - assert: "status == 200"
      - in: task_delivery
        assert: "result.status == 'ok'"
      - in: task_delivery
        find: { metric_key: due_date_compliance }
        equal: { value: 100, median: 50, range_min: 0, range_max: 100, p25: 25, p75: 75 }

  - name: "due_date_compliance — empty window (no data → no items)"
    request:
      url: /v1/metrics/queries
      method: POST
      body:
        queries:
          - id: task_delivery
            metric_id: 00000000-0000-0000-0001-000000000011
            $top: 50
            $filter: "person_id eq 'erin@example.com' and metric_date ge '2026-06-01' and metric_date le '2026-06-30'"
            $orderby: metric_key
    expect:
      - assert: "status == 200"
      - in: task_delivery
        assert: "result.status == 'ok'"
      - in: task_delivery
        assert: "size(items) == 0"
