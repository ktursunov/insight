spec_version: 1
description: >
  Metric: teams_meeting_hours — IC Bullet Collaboration (…0012), #1413.
  How it's computed (bronze → silver → gold):
    • bronze: daily Teams meeting report per person (audio/video/screen durations)
    • silver: deduped to per-person/day durations
    • gold:   per meeting take the longest single modality; value = the requested
              member's per-person SUM of those hours over the window, Teams-only —
              the M365 slice of meeting_hours (Zoom is excluded by definition).
              median/p25/p75/range = the distribution of those per-person SUMs
              across the member's DEPARTMENT (org_unit_id).

  Department: 5 Engineering members (alice, bob, carol, dave, erin) with meeting
  hours {1,2,3,4,5}, each seeded as one Teams meeting-row dated 2026-12-25 carrying
  AUDIO-only duration (video / screen = PT0S) so the longest single modality is
  exactly the audio hours. The IC case requests erin (5), so value = 5; the
  department of 5 yields median 3, p25 2, p75 4, range [1,5].
  Cases: custom scope (single window over the department) · empty window.

bronze:
  bronze_bamboohr.employees:
    - $ref: templates/people.yaml#/templates/alice
    - $ref: templates/people.yaml#/templates/bob
    - $ref: templates/people.yaml#/templates/carol
    - $ref: templates/people.yaml#/templates/dave
    - $ref: templates/people.yaml#/templates/erin

  bronze_m365.teams_activity:
    - { $ref: templates/m365_teams.yaml#/templates/m365_teams, userPrincipalName: alice@example.com, reportRefreshDate: "2026-12-25", unique_key: tmh-alice-20261225, audioDuration: PT1H, videoDuration: PT0S, screenShareDuration: PT0S }
    - { $ref: templates/m365_teams.yaml#/templates/m365_teams, userPrincipalName: alice@example.com, reportRefreshDate: "2026-12-25", unique_key: tmh-alice-20261225, audioDuration: PT1H, videoDuration: PT0S, screenShareDuration: PT0S }   # duplicate → dedup, not 2h
    - { $ref: templates/m365_teams.yaml#/templates/m365_teams, userPrincipalName: bob@example.com,   reportRefreshDate: "2026-12-25", unique_key: tmh-bob-20261225,   audioDuration: PT2H, videoDuration: PT0S, screenShareDuration: PT0S }
    - { $ref: templates/m365_teams.yaml#/templates/m365_teams, userPrincipalName: carol@example.com, reportRefreshDate: "2026-12-25", unique_key: tmh-carol-20261225, audioDuration: PT3H, videoDuration: PT0S, screenShareDuration: PT0S }
    - { $ref: templates/m365_teams.yaml#/templates/m365_teams, userPrincipalName: dave@example.com,  reportRefreshDate: "2026-12-25", unique_key: tmh-dave-20261225,  audioDuration: PT4H, videoDuration: PT0S, screenShareDuration: PT0S }
    - { $ref: templates/m365_teams.yaml#/templates/m365_teams, userPrincipalName: erin@example.com,  reportRefreshDate: "2026-12-25", unique_key: tmh-erin-20261225,  audioDuration: PT5H, videoDuration: PT0S, screenShareDuration: PT0S }

cases:
  # dept {1,2,3,4,5}; erin value 5. p25=2 median=3 p75=4 range=[1,5]
  - name: "teams_meeting_hours — custom scope (department of 5)"
    request:
      url: /v1/metrics/queries
      method: POST
      body:
        queries:
          - id: collaboration
            metric_id: 00000000-0000-0000-0001-000000000012
            $filter: "person_id eq 'erin@example.com' and metric_date ge '2026-12-01' and metric_date le '2026-12-31'"
    expect:
      - assert: "status == 200"
      - in: collaboration
        assert: "result.status == 'ok'"
      - in: collaboration
        find: { metric_key: teams_meeting_hours }
        equal: { value: 5, median: 3, range_min: 1, range_max: 5, p25: 2, p75: 4 }

  # ── EMPTY window (no rows in range) ──────────────────────────────────────────
  - name: "teams_meeting_hours — EMPTY window (no data → no items)"
    request:
      url: /v1/metrics/queries
      method: POST
      body:
        queries:
          - id: collaboration
            metric_id: 00000000-0000-0000-0001-000000000012
            $filter: "person_id eq 'erin@example.com' and metric_date ge '2026-06-01' and metric_date le '2026-06-30'"
    expect:
      - assert: "status == 200"
      - in: collaboration
        assert: "result.status == 'ok'"
      - in: collaboration
        assert: "size(items) == 0"
