spec_version: 1
description: >
  Metric: cc_active — IC Bullet AI (…0013), #1440.
  How it's computed (bronze → silver → gold):
    • bronze: Claude Team daily per-user metrics — any active row marks a Claude Code user
    • silver: class_ai_dev_usage (tool='claude_code'); one row per user/day
    • gold:   an ACTIVE-MARKER metric. ai_bullet_rows branch 3 emits ('cc_active', 1)
              for any claude_code day. The served IC query collapses each person to
              1 if they had ANY cc_active row in the window (else NULL), then:
                  value     = 1 for the requested person (active that window)
                  median    = 0   (hardcoded — active markers carry no real median)
                  range_min = 0   (hardcoded)
                  range_max = count of DEPARTMENT members active in the window
              i.e. the bullet renders "erin is 1 of N active members".

  Stat set: active markers return value/median/range_min/range_max (NO p25/p75/n).
  The no-unasserted-stat gate is self-scoping, so the four asserted here suffice.

  Department: 5 Engineering members (alice, bob, carol, dave, erin), all sharing one
  org_unit (Engineering). In the custom window (Nov 01 .. Dec 12) four members have a
  Claude Code row — bob & erin on Dec 10, carol & dave on Nov 15 — so range_max = 4
  ("erin is 1 of 4 active members"). alice's only row is Dec 25, outside the window,
  so she is a roster member but inactive here. The empty window (Jun) has no rows.

bronze:
  bronze_bamboohr.employees:
    - $ref: templates/people.yaml#/templates/alice
    - $ref: templates/people.yaml#/templates/bob
    - $ref: templates/people.yaml#/templates/carol
    - $ref: templates/people.yaml#/templates/dave
    - $ref: templates/people.yaml#/templates/erin

  bronze_claude_team.claude_team_code_metrics:
    # Any active claude_code row counts (status='active' default); total_sessions
    # is set to 1 only so each row carries some activity.
    # alice — Dec 25 (OUTSIDE the custom window → roster member, inactive here)
    - { $ref: templates/claude_team_usage.yaml#/templates/alice, metric_date: "2026-12-25", unique_key: cc-alice-20261225, total_sessions: 1 }
    # bob — Dec 10 (in window)
    - { $ref: templates/claude_team_usage.yaml#/templates/bob,   metric_date: "2026-12-10", unique_key: cc-bob-20261210,   total_sessions: 1 }
    # carol — Nov 15 (in window)
    - { $ref: templates/claude_team_usage.yaml#/templates/carol, metric_date: "2026-11-15", unique_key: cc-carol-20261115, total_sessions: 1 }
    # dave — Nov 15 (in window)
    - { $ref: templates/claude_team_usage.yaml#/templates/claude_team_metrics, email: dave@example.com, metric_date: "2026-11-15", unique_key: cc-dave-20261115, total_sessions: 1 }
    # erin — Dec 10 (in window); the requested IC member
    - { $ref: templates/claude_team_usage.yaml#/templates/claude_team_metrics, email: erin@example.com, metric_date: "2026-12-10", unique_key: cc-erin-20261210, total_sessions: 1 }
    - { $ref: templates/claude_team_usage.yaml#/templates/claude_team_metrics, email: erin@example.com, metric_date: "2026-12-10", unique_key: cc-erin-20261210, total_sessions: 1 }  # re-sync dup → active stays 1, not 2

cases:
  # ── CUSTOM scope (Nov 01 .. Dec 12) — bob, carol, dave, erin active ──────────
  - name: "cc_active — custom scope (department of 5)"
    request:
      url: /v1/metrics/queries
      method: POST
      body:
        queries:
          - id: ai
            metric_id: 00000000-0000-0000-0001-000000000013
            $top: 50
            $filter: "person_id eq 'erin@example.com' and metric_date ge '2026-11-01' and metric_date le '2026-12-12'"
            $orderby: metric_key
    expect:
      - assert: "status == 200"
      - in: ai
        assert: "result.status == 'ok'"
      - in: ai
        find: { metric_key: cc_active }
        equal: { value: 1, median: 0, range_min: 0, range_max: 4 }

  # ── EMPTY window (no rows in range) ──────────────────────────────────────────
  - name: "cc_active — EMPTY window (no data → no items)"
    request:
      url: /v1/metrics/queries
      method: POST
      body:
        queries:
          - id: ai
            metric_id: 00000000-0000-0000-0001-000000000013
            $top: 50
            $filter: "person_id eq 'erin@example.com' and metric_date ge '2026-06-01' and metric_date le '2026-06-30'"
            $orderby: metric_key
    expect:
      - assert: "status == 200"
      - in: ai
        assert: "result.status == 'ok'"
      - in: ai
        assert: "size(items) == 0"
