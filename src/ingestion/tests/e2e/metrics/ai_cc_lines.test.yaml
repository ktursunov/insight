spec_version: 1
description: >
  Metric: cc_lines — IC Bullet AI (…0013), #1440.
  How it's computed (bronze → silver → gold):
    • bronze: Claude Team daily per-user metrics (accepted lines)
    • silver: class_ai_dev_usage, deduped to one row per user/day (tool='claude_code');
              lines_added ← total_lines_accepted
    • gold:   ai_bullet_rows branch 3 emits ('cc_lines', lines_added) per day; the
              served IC query SUMs the requested person's per-day accepted lines over
              the window (value), and reports the DEPARTMENT distribution of those
              per-person SUMs as median/range_min/range_max.

  NOTE on the served stat set: the IC Bullet AI query_ref (id …0013) is last
  re-seeded by migration m20260618_000001 (cc_overage), which carries only
  value/median/range_min/range_max — NOT p25/p75/n. So these AI fixtures assert the
  four stats the API actually returns; the no-unasserted-stat gate is self-scoping
  and never requires p25/p75 on a row that does not carry them.

  Department: 5 Engineering members (alice, bob, carol, dave, erin), base rates
  r ∈ {10,20,30,40,50}. Each member is seeded two lines-rows inside the custom window
  (Nov 01 .. Dec 12) — one Nov 15 (2*r) + one Dec 10 (1*r) — so each per-person
  window SUM = 3*r. The IC case requests erin (r=50) → value 150; the department of 5
  yields the median/range below. Cases: custom scope · empty window.

bronze:
  bronze_bamboohr.employees:
    - $ref: templates/people.yaml#/templates/alice
    - $ref: templates/people.yaml#/templates/bob
    - $ref: templates/people.yaml#/templates/carol
    - $ref: templates/people.yaml#/templates/dave
    - $ref: templates/people.yaml#/templates/erin

  bronze_claude_team.claude_team_code_metrics:
    # Per member: Nov 15 = 2*r, Dec 10 = 1*r → window SUM = 3*r.
    # ── alice, r=10 ─────────────────────────────────────────────────────────────
    - { $ref: templates/claude_team_usage.yaml#/templates/alice, metric_date: "2026-11-15", unique_key: cc-alice-20261115, total_lines_accepted: 20 }   # 2r
    - { $ref: templates/claude_team_usage.yaml#/templates/alice, metric_date: "2026-12-10", unique_key: cc-alice-20261210, total_lines_accepted: 10 }   # 1r
    - { $ref: templates/claude_team_usage.yaml#/templates/alice, metric_date: "2026-12-10", unique_key: cc-alice-20261210, total_lines_accepted: 10 }   # duplicate → dedup to 10, not 20
    # ── bob, r=20 ───────────────────────────────────────────────────────────────
    - { $ref: templates/claude_team_usage.yaml#/templates/bob,   metric_date: "2026-11-15", unique_key: cc-bob-20261115,   total_lines_accepted: 40 }   # 2r
    - { $ref: templates/claude_team_usage.yaml#/templates/bob,   metric_date: "2026-12-10", unique_key: cc-bob-20261210,   total_lines_accepted: 20 }   # 1r
    # ── carol, r=30 ─────────────────────────────────────────────────────────────
    - { $ref: templates/claude_team_usage.yaml#/templates/carol, metric_date: "2026-11-15", unique_key: cc-carol-20261115, total_lines_accepted: 60 }   # 2r
    - { $ref: templates/claude_team_usage.yaml#/templates/carol, metric_date: "2026-12-10", unique_key: cc-carol-20261210, total_lines_accepted: 30 }   # 1r
    # ── dave, r=40 ──────────────────────────────────────────────────────────────
    - { $ref: templates/claude_team_usage.yaml#/templates/claude_team_metrics, email: dave@example.com, metric_date: "2026-11-15", unique_key: cc-dave-20261115,  total_lines_accepted: 80 }   # 2r
    - { $ref: templates/claude_team_usage.yaml#/templates/claude_team_metrics, email: dave@example.com, metric_date: "2026-12-10", unique_key: cc-dave-20261210,  total_lines_accepted: 40 }   # 1r
    # ── erin, r=50 (the requested IC member) ────────────────────────────────────
    - { $ref: templates/claude_team_usage.yaml#/templates/claude_team_metrics, email: erin@example.com, metric_date: "2026-11-15", unique_key: cc-erin-20261115,  total_lines_accepted: 100 }  # 2r
    - { $ref: templates/claude_team_usage.yaml#/templates/claude_team_metrics, email: erin@example.com, metric_date: "2026-12-10", unique_key: cc-erin-20261210,  total_lines_accepted: 50 }   # 1r

cases:
  # ── CUSTOM scope (Nov 01 .. Dec 12) — Nov 15 + Dec 10 rows ───────────────────
  # per-person sums 3r → dept {30,60,90,120,150}; erin value 150.
  - name: "cc_lines — custom scope (department of 5)"
    request:
      url: /v1/metrics/queries
      method: POST
      body:
        queries:
          - id: ai
            metric_id: 00000000-0000-0000-0001-000000000013
            $top: 50
            $filter: "person_id eq 'erin@example.com' and metric_date ge '2026-11-01' and metric_date le '2026-12-12'"
            $orderby: metric_key
    expect:
      - assert: "status == 200"
      - in: ai
        assert: "result.status == 'ok'"
      - in: ai
        find: { metric_key: cc_lines }
        equal: { value: 150, median: 90, range_min: 30, range_max: 150 }

  # ── EMPTY window (no rows in range) ──────────────────────────────────────────
  - name: "cc_lines — EMPTY window (no data → no items)"
    request:
      url: /v1/metrics/queries
      method: POST
      body:
        queries:
          - id: ai
            metric_id: 00000000-0000-0000-0001-000000000013
            $top: 50
            $filter: "person_id eq 'erin@example.com' and metric_date ge '2026-06-01' and metric_date le '2026-06-30'"
            $orderby: metric_key
    expect:
      - assert: "status == 200"
      - in: ai
        assert: "result.status == 'ok'"
      - in: ai
        assert: "size(items) == 0"
