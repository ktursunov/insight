spec_version: 1
description: >
  Metric: wiki_comments (Outline) — IC Bullet Wiki (…0041), #1440. SINGLE-WINDOW fixture.
  Department of 5 Engineering members (alice…erin); requested IC member = erin.
  One narrow custom window (2026-09-06 … 2026-09-12) holds ALL of this
  fixture's rows (dated 2026-09-09); a second case probes an empty window.

  ISOLATION: silver.class_wiki_pages / class_wiki_engagement are incremental
  delete+insert tables the e2e rig resets only at SESSION START — the per-test
  ledger truncates only the bronze a fixture seeds, so a sibling fixture's silver
  rows persist across tests. Every wiki fixture is therefore pinned to its OWN
  disjoint date + window so a leaked foreign row falls OUTSIDE this window and
  cannot perturb the stats. Anchor pages are dated 2025-06-15 (outside ALL windows) for the engagement INNER JOIN; per-person value = Σ comments received in the window = m → dept {1,2,3,4,5}.

bronze:
  bronze_bamboohr.employees:
    - $ref: templates/people.yaml#/templates/alice
    - $ref: templates/people.yaml#/templates/bob
    - $ref: templates/people.yaml#/templates/carol
    - $ref: templates/people.yaml#/templates/dave
    - $ref: templates/people.yaml#/templates/erin
  bronze_outline.wiki_pages:
    - { $ref: "templates/outline_wiki_pages.yaml#/templates/alice", page_id: pg-alice-1, unique_key: ol-alice-1, version_number: 1, created_at: "2025-06-15T00:00:00Z" }   # anchor (outside all windows)
    - { $ref: "templates/outline_wiki_pages.yaml#/templates/bob", page_id: pg-bob-1, unique_key: ol-bob-1, version_number: 1, created_at: "2025-06-15T00:00:00Z" }   # anchor (outside all windows)
    - { $ref: "templates/outline_wiki_pages.yaml#/templates/carol", page_id: pg-carol-1, unique_key: ol-carol-1, version_number: 1, created_at: "2025-06-15T00:00:00Z" }   # anchor (outside all windows)
    - { $ref: "templates/outline_wiki_pages.yaml#/templates/dave", page_id: pg-dave-1, unique_key: ol-dave-1, version_number: 1, created_at: "2025-06-15T00:00:00Z" }   # anchor (outside all windows)
    - { $ref: "templates/outline_wiki_pages.yaml#/templates/erin", page_id: pg-erin-1, unique_key: ol-erin-1, version_number: 1, created_at: "2025-06-15T00:00:00Z" }   # anchor (outside all windows)
  bronze_outline.wiki_comments:
    - { $ref: "templates/outline_wiki_comments.yaml#/templates/c", page_id: pg-alice-1, comment_id: calice-1, unique_key: oc-alice-1, created_at: "2026-09-09T01:00:00Z" }
    - { $ref: "templates/outline_wiki_comments.yaml#/templates/c", page_id: pg-bob-1, comment_id: cbob-1, unique_key: oc-bob-1, created_at: "2026-09-09T01:00:00Z" }
    - { $ref: "templates/outline_wiki_comments.yaml#/templates/c", page_id: pg-bob-1, comment_id: cbob-2, unique_key: oc-bob-2, created_at: "2026-09-09T02:00:00Z" }
    - { $ref: "templates/outline_wiki_comments.yaml#/templates/c", page_id: pg-carol-1, comment_id: ccarol-1, unique_key: oc-carol-1, created_at: "2026-09-09T01:00:00Z" }
    - { $ref: "templates/outline_wiki_comments.yaml#/templates/c", page_id: pg-carol-1, comment_id: ccarol-2, unique_key: oc-carol-2, created_at: "2026-09-09T02:00:00Z" }
    - { $ref: "templates/outline_wiki_comments.yaml#/templates/c", page_id: pg-carol-1, comment_id: ccarol-3, unique_key: oc-carol-3, created_at: "2026-09-09T03:00:00Z" }
    - { $ref: "templates/outline_wiki_comments.yaml#/templates/c", page_id: pg-dave-1, comment_id: cdave-1, unique_key: oc-dave-1, created_at: "2026-09-09T01:00:00Z" }
    - { $ref: "templates/outline_wiki_comments.yaml#/templates/c", page_id: pg-dave-1, comment_id: cdave-2, unique_key: oc-dave-2, created_at: "2026-09-09T02:00:00Z" }
    - { $ref: "templates/outline_wiki_comments.yaml#/templates/c", page_id: pg-dave-1, comment_id: cdave-3, unique_key: oc-dave-3, created_at: "2026-09-09T03:00:00Z" }
    - { $ref: "templates/outline_wiki_comments.yaml#/templates/c", page_id: pg-dave-1, comment_id: cdave-4, unique_key: oc-dave-4, created_at: "2026-09-09T04:00:00Z" }
    - { $ref: "templates/outline_wiki_comments.yaml#/templates/c", page_id: pg-erin-1, comment_id: cerin-1, unique_key: oc-erin-1, created_at: "2026-09-09T01:00:00Z" }
    - { $ref: "templates/outline_wiki_comments.yaml#/templates/c", page_id: pg-erin-1, comment_id: cerin-2, unique_key: oc-erin-2, created_at: "2026-09-09T02:00:00Z" }
    - { $ref: "templates/outline_wiki_comments.yaml#/templates/c", page_id: pg-erin-1, comment_id: cerin-3, unique_key: oc-erin-3, created_at: "2026-09-09T03:00:00Z" }
    - { $ref: "templates/outline_wiki_comments.yaml#/templates/c", page_id: pg-erin-1, comment_id: cerin-4, unique_key: oc-erin-4, created_at: "2026-09-09T04:00:00Z" }
