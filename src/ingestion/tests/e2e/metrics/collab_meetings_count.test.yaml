spec_version: 1
description: >
  Metric: meetings_count — IC Bullet Collaboration (…0012), #1413.
  How it's computed (bronze → silver → gold):
    • bronze: daily Teams meeting report per person (meetings attended)
    • silver: deduped to meetings-attended per person/day
    • gold:   value = the requested member's per-person SUM of meetings attended
              over the window, across Teams + Zoom (additive — though seeded
              Teams-only here, see the Zoom note below). median/p25/p75/range =
              the distribution of those per-person SUMs across the member's
              DEPARTMENT (org_unit_id).

  Department: 5 Engineering members (alice, bob, carol, dave, erin) with meetings
  attended {1,2,3,4,5}, each seeded as one Teams meeting-row dated 2026-12-25.
  The IC case requests erin (5), so value = 5; the department of 5 yields
  median 3, p25 2, p75 4, range [1,5].

  Zoom note: the Zoom side is intentionally NOT used to vary per-person counts.
  bronze_zoom.participants is ReplacingMergeTree ORDER BY email, so EVERY
  participant row for one email collapses to a single bronze row on RMT merge —
  a person can contribute at most ONE distinct Zoom meeting per day regardless of
  how many participant rows are seeded. The cross-source-additive proof therefore
  lives in collab_meeting_hours (one Zoom row per member, which survives); here
  the count is Teams-only so each member's value is exactly meetingsAttendedCount.
  Cases: custom scope (single window over the department) · empty window.

bronze:
  bronze_bamboohr.employees:
    - $ref: templates/people.yaml#/templates/alice
    - $ref: templates/people.yaml#/templates/bob
    - $ref: templates/people.yaml#/templates/carol
    - $ref: templates/people.yaml#/templates/dave
    - $ref: templates/people.yaml#/templates/erin

  bronze_m365.teams_activity:
    - { $ref: templates/m365_teams.yaml#/templates/m365_teams, userPrincipalName: alice@example.com, reportRefreshDate: "2026-12-25", unique_key: mc-alice-20261225, meetingsAttendedCount: 1 }
    - { $ref: templates/m365_teams.yaml#/templates/m365_teams, userPrincipalName: alice@example.com, reportRefreshDate: "2026-12-25", unique_key: mc-alice-20261225, meetingsAttendedCount: 1 }   # duplicate → dedup, not 2
    - { $ref: templates/m365_teams.yaml#/templates/m365_teams, userPrincipalName: bob@example.com,   reportRefreshDate: "2026-12-25", unique_key: mc-bob-20261225,   meetingsAttendedCount: 2 }
    - { $ref: templates/m365_teams.yaml#/templates/m365_teams, userPrincipalName: carol@example.com, reportRefreshDate: "2026-12-25", unique_key: mc-carol-20261225, meetingsAttendedCount: 3 }
    - { $ref: templates/m365_teams.yaml#/templates/m365_teams, userPrincipalName: dave@example.com,  reportRefreshDate: "2026-12-25", unique_key: mc-dave-20261225,  meetingsAttendedCount: 4 }
    - { $ref: templates/m365_teams.yaml#/templates/m365_teams, userPrincipalName: erin@example.com,  reportRefreshDate: "2026-12-25", unique_key: mc-erin-20261225,  meetingsAttendedCount: 5 }

cases:
  # dept {1,2,3,4,5}; erin value 5. p25=2 median=3 p75=4 range=[1,5]
  - name: "meetings_count — custom scope (department of 5)"
    request:
      url: /v1/metrics/queries
      method: POST
      body:
        queries:
          - id: collaboration
            metric_id: 00000000-0000-0000-0001-000000000012
            $filter: "person_id eq 'erin@example.com' and metric_date ge '2026-12-01' and metric_date le '2026-12-31'"
    expect:
      - assert: "status == 200"
      - in: collaboration
        assert: "result.status == 'ok'"
      - in: collaboration
        find: { metric_key: meetings_count }
        equal: { value: 5, median: 3, range_min: 1, range_max: 5, p25: 2, p75: 4 }

  # ── EMPTY window (no rows in range) ──────────────────────────────────────────
  - name: "meetings_count — EMPTY window (no data → no items)"
    request:
      url: /v1/metrics/queries
      method: POST
      body:
        queries:
          - id: collaboration
            metric_id: 00000000-0000-0000-0001-000000000012
            $filter: "person_id eq 'erin@example.com' and metric_date ge '2026-06-01' and metric_date le '2026-06-30'"
    expect:
      - assert: "status == 200"
      - in: collaboration
        assert: "result.status == 'ok'"
      - in: collaboration
        assert: "size(items) == 0"
