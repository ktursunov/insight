    - { $ref: "templates/confluence_wiki_footer_comments.yaml#/templates/c", page_id: cp-erin-1, comment_id: ferin-1, unique_key: fc-erin-1, created_at: "2026-08-05T01:00:00Z" }   # re-sync dup → not doubled

cases:
  - name: "wiki_comments (Confluence) — custom scope (department of 5)"
    request:
      url: /v1/metrics/queries
      method: POST
      body:
        queries:
          - id: wiki
            metric_id: 00000000-0000-0000-0001-000000000041
            $top: 50
            $filter: "person_id eq 'erin@example.com' and metric_date ge '2026-08-02' and metric_date le '2026-08-08'"
            $orderby: metric_key
    expect:
      - assert: "status == 200"
      - in: wiki
        assert: "result.status == 'ok'"
      - in: wiki
        find: { metric_key: wiki_comments }
        equal: { value: 5, median: 3, range_min: 1, range_max: 5 }

  - name: "wiki_comments (Confluence) — EMPTY window (no data → no items)"
    request:
      url: /v1/metrics/queries
      method: POST
      body:
        queries:
          - id: wiki
            metric_id: 00000000-0000-0000-0001-000000000041
            $top: 50
            $filter: "person_id eq 'erin@example.com' and metric_date ge '2026-07-01' and metric_date le '2026-07-07'"
            $orderby: metric_key
    expect:
      - assert: "status == 200"
      - in: wiki
        assert: "result.status == 'ok'"
      - in: wiki
        assert: "size(items) == 0"
