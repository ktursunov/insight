spec_version: 1
description: >
  Task Delivery - bugs_to_task_ratio - JIRA, IC Bullet Task Delivery (...0011),
  department-of-5 distribution + 6 stats in a single custom window.

  bronze -> silver -> gold: jira_issue + jira_issue_history (Status->Closed event
  = metric_date) + jira_user. issuetype lives in custom_fields_json
  (JSONExtract issuetype.name). jira_closed_tasks per (person, close-day):
    tasks_closed = count()  (ALL closed issues, bugs included);
    bugs_fixed   = countIf(issue_type='Bug').
  The ...0011 query_ref: if(Σtasks>0, round(100*Σbugs_fixed/Σtasks_completed, 1)).
  NOTE the denominator is count() of ALL closed issues — a Bug counts in BOTH
  numerator and denominator.

  Department: 5 Engineering members alice..erin of rank r in 1..5. Each closes
  EXACTLY 4 issues on the same close date (2026-12-25): (r-1) Bugs + (5-r) Tasks
  -> per-person ratio = 100*(r-1)/4 = {0,25,50,75,100}. alice(r=1)=0% (0 bugs /
  4 closed, denominator 4>0 so NOT dropped); erin(r=5)=100%. value = the requested
  member's OWN ratio; median/p25/p75/range = the department distribution.
  Empty window 2026-06 -> no items.

