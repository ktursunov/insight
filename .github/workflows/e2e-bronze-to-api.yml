name: E2E — Bronze to API

# End-to-end transformation tests covering bronze → dbt → ClickHouse
# migration views → analytics-api HTTP response → expect rules.
#
# Everything (Python, Rust, dbt, pytest) runs inside the runner image
# defined at src/ingestion/tests/e2e/compose/Dockerfile.runner. The same
# image is used for local development via src/ingestion/tests/e2e/e2e.sh.
#
# Three jobs:
#   • `e2e` — boots ClickHouse + MariaDB + analytics-api, runs the bronze→API
#     transformation suite, and — while analytics-api is already up — snapshots
#     the metric catalog into `.artifacts/`, which it uploads as `coverage-inputs`.
#   • `metric-coverage-gate` — pure-Python analysis of that catalog (no Docker,
#     no app boot). See src/ingestion/tests/e2e/lib/{metric_coverage,collect_metrics}.py.
#   • `openapi-spec-drift-gate` — builds analytics-api and dumps its OpenAPI
#     document OFFLINE (`analytics-api openapi` — no DB, no HTTP listener; see
#     api::openapi_document), then drift-checks it against the committed
#     docs/components/backend/analytics-api/openapi.json. No live server boot,
#     no shared artifact. See scripts/ci/openapi_spec.py.
#
# Specs: docs/domain/bronze-to-api-e2e/specs/
# Code:  src/ingestion/tests/e2e/

on:
  # PR-only — branch protection gates
  # merge on PR success, and re-running the full bronze→API stack
  # (clickhouse + mariadb + dbt + pytest) on the merge commit just burns
  # ~30 minutes for an outcome we already proved. workflow_dispatch
  # remains for manual reruns against main.
  #
  # Deliberately NO `paths:` filter: this check is meant to be a required
  # status check on main, and a path-filtered required check never reports
  # on PRs outside the filter — they hang on "Expected" forever. Running on
  # every PR keeps the gate uniform; the serial suite costs ~4 min with a
  # warm cargo cache.
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  # NB: forbids developers from running `pytest --update-snapshots` in CI.
  # The guard lives in src/ingestion/tests/e2e/metrics/test_fixtures.py.
  CI: "true"

jobs:
  e2e:
    name: Run E2E suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: src/ingestion/tests/e2e

    steps:
      - uses: actions/checkout@v4

      # docker-container buildx driver — required for the gha cache export that
      # compose/docker-compose.cache.yml wires onto the build-only services.
      - uses: docker/setup-buildx-action@v3

      # ─── Build the runner image ─────────────────────────────────────────
      # The runner bakes in analytics-api + each connector's enrich binary, each
      # compiled FROM ITS OWN Dockerfile via build-only services wired as
      # `additional_contexts` (see compose/docker-compose.runner.yml). Nothing is
      # compiled inside the runner at test time.
      #
      # E2E_COMPOSE_OVERLAYS layers compose/docker-compose.cache.yml on top, which
      # points each Rust build (and the runner's pip layer) at the GitHub Actions
      # BuildKit cache. On a warm cache with an unchanged Cargo.lock/pyproject.toml
      # the dependency-compile layers restore instead of recompiling.
      - name: Build runner image
        run: ./e2e.sh build
        env:
          E2E_COMPOSE_OVERLAYS: compose/docker-compose.cache.yml

      # ─── Run the suite inside the runner ────────────────────────────────
      # `./e2e.sh test` (docker compose run runner) starts the clickhouse +
      # mariadb `depends_on` services — compose pulls their images on demand
      # and waits for `service_healthy` — so no explicit image pre-pull is needed.
      # Serial on purpose: the session rig is not xdist-safe yet (see
      # conftest.py — per-worker analytics-api spawns race SeaORM migrations
      # in the shared MariaDB, non-primary workers don't wait for ClickHouse
      # migrations, and the shared dbt target/ dir is deleted by whichever
      # worker finishes first). Wall-time cost is negligible: the runner image
      # build (which compiles analytics-api + enrich) dominates the job.
      #
      # The suite ALSO snapshots the metric catalog to .artifacts/catalog_metrics.json
      # (lib/collect_metrics.py, while analytics-api is up) — the
      # metric-coverage-gate job below analyses it, no second app boot.
      - name: Run E2E suite
        run: ./e2e.sh test --tb=short -q

      # ─── Hand the collected catalog to the gate job ─────────────────────
      # Uploaded even if the suite failed (the collection script still runs), so the
      # gate reports alongside a red suite. `path` is workspace-relative (actions
      # ignore defaults.run.working-directory).
      - name: Upload coverage inputs
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-inputs
          path: src/ingestion/tests/e2e/.artifacts/
          # `.artifacts/` is a dotdir; upload-artifact@v4 skips hidden paths by
          # default (include-hidden-files: false) — without this it uploads
          # nothing and the gate job fails with "artifact not found".
          include-hidden-files: true
          # The gate is useless without the catalog; fail loudly here rather than
          # as a confusing downstream "artifact not found".
          if-no-files-found: error
          retention-days: 7

      # ─── Diagnostics on failure ─────────────────────────────────────────
      - name: Dump compose logs on failure
        if: failure()
        run: |
          echo "::group::clickhouse logs"
          ./e2e.sh logs clickhouse || true
          echo "::endgroup::"
          echo "::group::mariadb logs"
          ./e2e.sh logs mariadb || true
          echo "::endgroup::"

      - name: Tear down
        if: always()
        run: ./e2e.sh down || true

  # ─── Metric-coverage gate — pure-Python analysis of the collected catalog ──
  # Runs after `e2e` (needs), downloads `coverage-inputs`, reads the catalog file.
  # No Docker, no analytics-api boot. `!cancelled()` so it still reports when the
  # suite itself failed (the artifact is usually present).
  metric-coverage-gate:
    name: Metric coverage gate
    needs: e2e
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          name: coverage-inputs
          path: coverage-inputs
      - name: Analyse metric coverage
        run: |
          pip install --quiet pyyaml
          python3 src/ingestion/tests/e2e/lib/metric_coverage.py \
            --universe-file coverage-inputs/catalog_metrics.json | tee metric_coverage.md
          rc=${PIPESTATUS[0]}
          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then cat metric_coverage.md >> "$GITHUB_STEP_SUMMARY"; fi
          if [ "$rc" -ne 0 ]; then echo "::error::metric coverage gate failed — a metric_key is value-tested by no test and not in SKIP_TABLES/SKIP_LIST (or a skip is stale). See the report."; fi
          exit "$rc"

  # ─── OpenAPI spec-drift gate — fully offline ─────────────────────────────
  # Builds analytics-api and dumps its OpenAPI document with `analytics-api
  # openapi` (no database, no HTTP listener — see api::openapi_document), then
  # diffs it against the committed doc. Independent of the `e2e` job: no live
  # server boot, no shared artifact, no ClickHouse/MariaDB.
  openapi-spec-drift-gate:
    name: OpenAPI spec drift gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/backend -> target
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate the OpenAPI doc offline and drift-check it
        run: |
          (cd src/backend && cargo run --quiet -p analytics-api --bin analytics-api -- openapi) > openapi.live.json
          python3 scripts/ci/openapi_spec.py check --live-file openapi.live.json | tee openapi_drift.txt
          rc=${PIPESTATUS[0]}
          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then { echo '```'; cat openapi_drift.txt; echo '```'; } >> "$GITHUB_STEP_SUMMARY"; fi
          if [ "$rc" -ne 0 ]; then echo "::error::OpenAPI spec drift — docs/components/backend/analytics-api/openapi.json is stale. Regenerate: (cd src/backend && cargo run -p analytics-api -- openapi) > docs/components/backend/analytics-api/openapi.json"; fi
          exit "$rc"
