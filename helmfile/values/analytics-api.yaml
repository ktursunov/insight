##
## Analytics API — local development overrides
##
## Base values: src/backend/services/analytics-api/helm/values.yaml
##
## Config Secret: `insight-analytics-api-config` carries
##   ANALYTICS__database_url
##   ANALYTICS__clickhouse_url, ANALYTICS__clickhouse_database,
##   ANALYTICS__clickhouse_user, ANALYTICS__clickhouse_password
##   ANALYTICS__identity_url
##   ANALYTICS__redis_url
##   ANALYTICS__bind_addr
##   ANALYTICS__metric_catalog__tenant_default_id (optional; single-tenant
##                                                 Metric Catalog fallback,
##                                                 see DESIGN §2.2
##                                                 cpt-metric-cat-constraint-
##                                                 tenant-default)
## Emitted by the umbrella chart automatically. For helmfile-only deploys
## the Secret must already exist in the namespace.
##

replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
